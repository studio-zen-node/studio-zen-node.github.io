<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Studio Zen-Node</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* 基本スタイル */
        .blog-post { line-height: 1.8; color: #ddd; }
        .blog-post h1 { color: #007bff; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 1.5rem; }
        .blog-post h2 { color: #fff; margin-top: 2rem; border-left: 4px solid #007bff; padding-left: 15px; }
        .blog-post h3 { color: #eee; margin-top: 1.5rem; font-size: 1.2rem; }
        .blog-post p { margin-bottom: 1rem; }
        .blog-post code { background: #222; padding: 2px 5px; border-radius: 4px; color: #ff79c6; font-family: monospace; }
        .blog-post pre { background: #111; padding: 15px; border-radius: 8px; overflow-x: auto; border: 1px solid #333; }
        .blog-post img { max-width: 100%; border-radius: 8px; margin: 1rem 0; pointer-events: none; }
        
        .back-link { display: inline-block; margin-bottom: 20px; color: #007bff; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .back-link:hover { text-decoration: underline; opacity: 0.8; }

        /* --- 目次（index）専用のボタン型スタイル --- */
        .is-index ul { list-style: none; padding: 0; }
        .is-index > ul > li { margin-bottom: 1.5rem; }
        
        /* 記事リンクのボタン化 */
        .is-index > ul > li > a {
            display: block;
            background: #111;
            border: 1px solid #222;
            padding: 20px;
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            border-left: 4px solid #007bff;
            transition: 0.3s ease;
        }
        .is-index > ul > li > a:hover {
            background: #1a1a1a;
            border-color: #007bff;
            transform: translateX(5px);
        }

        /* 説明文（子リスト） */
        .is-index ul li ul { margin: 10px 0 0 20px; color: #888; font-size: 0.9rem; list-style: disc; }
        .is-index ul li ul li { margin-bottom: 5px; border: none; padding: 0; background: transparent; }

        /* --- Homeへ戻るボタンの装飾 --- */
        .is-index hr { border: 0; border-top: 1px solid #222; margin: 40px 0 20px; }
        
        /* 特定のリンク（Homeへ戻る）を丸ボタンにする */
        .is-index a[href="index.html"] {
            display: block;
            width: fit-content;
            margin: 30px auto 10px;
            background: transparent;
            border: 1px solid #007bff;
            color: #007bff;
            padding: 12px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            text-align: center;
        }
        .is-index a[href="index.html"]:hover {
            background: #007bff;
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.4);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <script src="menu.js"></script>

    <div class="container">
        <a id="back-btn" href="blog.html" class="back-link">← Blog List</a>
        
        <article id="content" class="card blog-post">
            <p>Loading post...</p>
        </article>
    </div>

    <div class="footer">&copy; 2026 Studio Zen-Node</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const postName = urlParams.get('p') || 'index';
        const contentDiv = document.getElementById('content');
        const backBtn = document.getElementById('back-btn');

        // 目次ページ(index)の場合の初期設定
        if (postName === 'index') {
            backBtn.style.display = 'none'; // 戻るボタンを消す
            contentDiv.classList.add('is-index'); // ボタン型スタイルを適用
        }

        async function loadPost() {
            try {
                const response = await fetch(`posts/${postName}.md`);
                if (!response.ok) throw new Error('Post not found');
                
                const mdText = await response.text();
                
                // ブラウザのタブ名を更新
                document.title = (postName === 'index') 
                    ? "Blog List | Studio Zen-Node" 
                    : `${postName} | Blog | Studio Zen-Node`;
                
                // MarkdownをHTMLに変換して流し込み
                contentDiv.innerHTML = marked.parse(mdText);
            } catch (err) {
                contentDiv.innerHTML = `
                    <div style="text-align:center; padding: 50px 0;">
                        <h2 style="color:#ff4444; border:none; padding:0;">404 Not Found</h2>
                        <p>指定された記事は見つかりませんでした。</p>
                        <a href="blog.html" class="btn-home" style="margin-top:20px;">ブログ一覧へ戻る</a>
                    </div>
                `;
            }
        }

        loadPost();

        // セキュリティ機能の補完（JS側でも制限）
        document.addEventListener('dragstart', e => e.preventDefault());
    </script>
</body>
</html>
