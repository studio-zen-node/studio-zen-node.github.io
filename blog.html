<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Studio Zen-Node</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .blog-post {
            line-height: 1.8;
            color: #ddd;
        }
        .blog-post h1 { color: #007bff; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 1.5rem; }
        .blog-post h2 { color: #fff; margin-top: 2rem; border-left: 4px solid #007bff; padding-left: 15px; }
        .blog-post h3 { color: #eee; margin-top: 1.5rem; }
        .blog-post p { margin-bottom: 1rem; }
        .blog-post code { background: #222; padding: 2px 5px; border-radius: 4px; color: #ff79c6; font-family: monospace; }
        .blog-post pre { background: #111; padding: 15px; border-radius: 8px; overflow-x: auto; border: 1px solid #333; }
        .blog-post img { max-width: 100%; border-radius: 8px; margin: 1rem 0; pointer-events: none; }
        
        .back-link { display: inline-block; margin-bottom: 20px; color: #007bff; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .back-link:hover { text-decoration: underline; opacity: 0.8; }
    </style>
</head>
<body oncontextmenu="return false;">

    <script src="menu.js"></script>

    <div class="container">
        <a href="blog.html" class="back-link">← Blog List</a>
        
        <article id="content" class="card blog-post">
            <p>Loading post...</p>
        </article>
    </div>

    <div class="footer">&copy; 2026 Studio Zen-Node</div>

    <script>
        // URLパラメータからファイル名を取得
        const urlParams = new URLSearchParams(window.location.search);
        const postName = urlParams.get('p') || 'index';

        async function loadPost() {
            const contentDiv = document.getElementById('content');
            try {
                // posts フォルダ内の .md ファイルを取得
                const response = await fetch(`posts/${postName}.md`);
                if (!response.ok) throw new Error('Post not found');
                
                const mdText = await response.text();
                // タイトルを記事の内容に合わせて動的に変更（任意）
                document.title = `${postName} | Blog | Studio Zen-Node`;
                
                // マークダウンをHTMLに変換
                contentDiv.innerHTML = marked.parse(mdText);
            } catch (err) {
                contentDiv.innerHTML = `
                    <h2 style="color:#ff4444; border:none;">404 Not Found</h2>
                    <p>指定された記事（${postName}.md）が見つかりませんでした。</p>
                    <a href="blog.html" style="color:#007bff;">ブログ一覧へ戻る</a>
                `;
            }
        }

        // セキュリティ：右クリックとドラッグの禁止
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('dragstart', e => e.preventDefault());

        loadPost();
    </script>
</body>
</html>
