<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Zen-Node Receipt System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root {
--primary-green: #28a745;
--text-dark: #333;
--bg-gray: #f8f9fa;
--font-serif: "Times New Roman", "MS PMincho", serif;
--font-sans: "Inter", "Helvetica Neue", "Arial", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
}

    body {
        background-color: var(--bg-gray);
        font-family: var(--font-sans);
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* 認証オーバーレイ */
    #auth-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
    }

    .auth-container {
        text-align: center;
        padding: 40px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        border-radius: 8px;
    }

    .auth-container input {
        padding: 10px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 4px;
        margin-bottom: 10px;
        width: 200px;
    }

    .auth-container button {
        padding: 10px 20px;
        background: var(--primary-green);
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    /* 操作パネル */
    .controls {
        margin: 20px 0;
        width: 210mm;
        display: flex;
        gap: 15px;
        background: #fff;
        padding: 20px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        border-radius: 8px;
        box-sizing: border-box;
    }

    .controls input {
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        flex-grow: 1;
    }

    .save-btn {
        background-color: var(--primary-green);
        color: white;
        border: none;
        padding: 10px 30px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        transition: opacity 0.2s;
    }

    .save-btn:hover {
        opacity: 0.8;
    }

    /* A4キャンバス */
    #receipt-canvas {
        width: 210mm;
        height: 297mm;
        background-color: white;
        box-shadow: 0 0 20px rgba(0,0,0,0.1);
        position: relative;
        box-sizing: border-box;
        padding: 60px 80px; /* 十分なホワイトスペース */
        overflow: hidden;
        color: var(--text-dark);
    }

    /* 偽造防止：透かし */
    #receipt-canvas::after {
        content: "OFFICIAL RECEIPT";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(-45deg);
        font-size: 80px;
        color: rgba(0, 0, 0, 0.03);
        font-weight: bold;
        white-space: nowrap;
        pointer-events: none;
        z-index: 0;
    }

    .header {
        text-align: center;
        margin-bottom: 60px;
    }

    .header h1 {
        font-size: 32px;
        letter-spacing: 12px;
        margin-bottom: 10px;
        font-weight: 500;
    }

    .header-line {
        border-bottom: 2px solid #000;
        width: 100%;
    }

    .receipt-info {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 80px;
    }

    .receipt-id {
        font-size: 12px;
        color: #888;
    }

    .address-box {
        font-size: 24px;
        border-bottom: 1px solid #000;
        padding-bottom: 5px;
        min-width: 300px;
        margin-bottom: 100px;
    }

    .amount-display {
        text-align: center;
        margin-bottom: 100px;
    }

    .amount-display .label {
        font-size: 14px;
        margin-bottom: 10px;
        display: block;
    }

    .amount-display .value {
        font-family: var(--font-serif);
        font-size: 48px;
        border-bottom: 3px double #000;
        padding: 0 40px 10px;
        display: inline-block;
    }

    .purpose-box {
        margin-bottom: 150px;
        font-size: 16px;
    }

    /* 署名エリア */
    .signature-area {
        position: absolute;
        bottom: 80px;
        right: 80px;
        text-align: left;
        min-width: 250px;
    }

    .sig-item {
        display: block;
        line-height: 1.8;
        font-size: 14px;
    }

    .brand-name {
        font-size: 20px;
        font-weight: bold;
        margin: 5px 0;
        position: relative;
    }

    /* 印面画像 */
    .seal-img {
        position: absolute;
        width: 70px;
        height: 70px;
        right: -30px;
        top: -15px;
        opacity: 0.8;
        pointer-events: none;
        z-index: 2;
    }

    @media print {
        .controls, #auth-overlay {
            display: none !important;
        }
        body {
            background: none;
        }
        #receipt-canvas {
            box-shadow: none;
        }
    }
</style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-container">
        <h2>管理者認証</h2>
        <input type="password" id="pass-input" placeholder="Password">
        <br>
        <button onclick="checkAuth()">ログイン</button>
        <p id="auth-error" style="color:red; display:none; font-size:12px; margin-top:10px;">パスワードが正しくありません。</p>
    </div>
</div>

<div class="controls">
    <input type="text" id="input-name" placeholder="宛名" oninput="updateReceipt()">
    <input type="number" id="input-amount" placeholder="金額" oninput="updateReceipt()">
    <input type="text" id="input-purpose" placeholder="但書き" value="動画制作代金として" oninput="updateReceipt()">
    <button class="save-btn" onclick="generatePDF()">PDFを保存</button>
</div>

<div id="receipt-canvas">
    <div class="receipt-id" id="display-id">ZN-XXXXXXXX</div>
    
    <div class="header">
        <h1>受領証</h1>
        <div class="header-line"></div>
    </div>

    <div class="address-box">
        <span id="display-name">＿＿＿＿＿＿＿＿＿＿</span> 様
    </div>

    <div class="amount-display">
        <span class="label">金額</span>
        <div class="value">￥ <span id="display-amount">0</span> -</div>
    </div>

    <div class="purpose-box">
        但：<span id="display-purpose">サービス利用料として</span>
    </div>

    <div class="signature-area">
        <span class="sig-item" id="display-date">0000年00月00日</span>
        <div class="brand-name">
            Studio Zen-Node
            <img src="zen-node-seal.png" alt="Seal" class="seal-img" onerror="this.style.display='none'">
        </div>
        <span class="sig-item">Email: miyazaki.ngn@gmail.com</span>
        <span class="sig-item">URL: https://studio-zen-node.github.io/</span>
    </div>
</div>

<script>
    // 認証
    function checkAuth() {
        const pass = document.getElementById('pass-input').value;
        if(pass === 'zen0403') {
            document.getElementById('auth-overlay').style.display = 'none';
            initReceipt();
        } else {
            document.getElementById('auth-error').style.display = 'block';
        }
    }

    // ID生成
    function generateID() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let result = 'ZN-';
        for (let i = 0; i < 8; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
    }

    // 初期化
    function initReceipt() {
        const now = new Date();
        const dateStr = now.getFullYear() + '年' + (now.getMonth() + 1) + '月' + now.getDate() + '日';
        document.getElementById('display-date').innerText = dateStr;
        document.getElementById('display-id').innerText = generateID();
    }

    // リアルタイム反映
    function updateReceipt() {
        const name = document.getElementById('input-name').value;
        const amount = document.getElementById('input-amount').value;
        const purpose = document.getElementById('input-purpose').value;

        document.getElementById('display-name').innerText = name || '＿＿＿＿＿＿＿＿＿＿';
        document.getElementById('display-amount').innerText = amount ? Number(amount).toLocaleString() : '0';
        document.getElementById('display-purpose').innerText = purpose || '動画制作代金として';
    }

    // PDF生成
    function generatePDF() {
        const element = document.getElementById('receipt-canvas');
        const name = document.getElementById('input-name').value || '名称未設定';
        const date = new Date().toISOString().split('T')[0];
        const filename = `${date}_${name}_受領証.pdf`;

        const opt = {
            margin: 0,
            filename: filename,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 3, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save();
    }

    // Enterキーでログイン
    document.getElementById('pass-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') checkAuth();
    });
</script>
</body>
</html>
