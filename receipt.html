<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Generator | Studio Zen-Node</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* 管理者認証前の隠蔽 */
        body { background: #111; color: #ccc; font-family: sans-serif; margin: 0; padding: 20px; display: none; }
        
        .config-panel { max-width: 800px; margin: 0 auto 30px; background: #1a1a1a; padding: 25px; border-radius: 12px; border: 1px solid #333; }
        .config-input { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; }
        
        .save-btn { width: 100%; padding: 20px; background: #28a745; color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }

        /* 領収書本体（余裕を持たせたA4レイアウト） */
        #receipt-pdf-area {
            width: 794px; /* A4幅相当 */
            height: 1123px; /* A4高相当 */
            margin: 0 auto; background: #fff; color: #000; padding: 100px 80px; 
            box-sizing: border-box; position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .receipt-header { font-size: 3rem; font-weight: 900; text-align: center; border-bottom: 4px solid #000; padding-bottom: 20px; margin-bottom: 80px; letter-spacing: 1.5rem; }
        .receipt-to { font-size: 1.6rem; border-bottom: 2px solid #000; display: inline-block; min-width: 400px; margin-bottom: 70px; padding-bottom: 5px; }
        .amount-box { text-align: center; font-size: 4rem; font-weight: bold; border-bottom: 3px double #000; margin: 80px 0; padding: 20px 0; font-family: "Times New Roman", serif; }
        .amount-box::before { content: "￥"; font-size: 2.8rem; }
        .amount-box::after { content: " -"; font-size: 2.8rem; }

        /* 偽造防止用透かし */
        .watermark {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 6rem; color: rgba(0,0,0,0.03); font-weight: bold; pointer-events: none; white-space: nowrap;
            user-select: none;
        }

        .issuer-info { text-align: right; position: absolute; bottom: 100px; right: 80px; }
        .issuer-brand { font-size: 2.2rem; font-weight: 900; margin-bottom: 5px; }
        .issuer-stamp-img {
            width: 100px; position: absolute; bottom: -30px; right: -15px;
            transform: rotate(-8deg); mix-blend-mode: multiply; opacity: 0.9;
        }

        /* 印刷時はパネルを非表示 */
        @media print { .config-panel { display: none; } body { padding: 0; } }
    </style>
</head>
<body>

    <div class="config-panel">
        <h2 style="color:#28a745; margin-top:0;">Studio Zen-Node 管理パネル</h2>
        <input type="text" id="in-name" class="config-input" placeholder="クライアント名（例：長野 太郎）" oninput="update()">
        <input type="date" id="in-date" class="config-input" oninput="update()">
        <input type="number" id="in-price" class="config-input" value="1000" oninput="update()">
        <input type="text" id="in-note" class="config-input" value="動画制作代金として" oninput="update()">
        
        <button class="save-btn" onclick="downloadPDF()">PDFを受領証として自動保存</button>
    </div>

    <div id="receipt-pdf-area">
        <div class="watermark">ORIGINAL RECEIPT</div>
        
        <div class="receipt-header">受 領 証</div>
        
        <div class="receipt-to">
            <span id="out-name"></span> 御中
        </div>

        <div class="amount-box" id="out-price">1,000</div>

        <div style="font-size: 1.3rem; line-height: 2.5;">
            上記、正に受領いたしました。<br>
            但し、<span id="out-note"></span><br>
            <span style="font-size: 0.9rem; color: #666;">（内訳：Amazonギフト券によるお支払い / 決済ID: <span id="out-id"></span>）</span>
        </div>

        <div class="issuer-info">
            <p id="out-date" style="font-weight: bold; font-size: 1.2rem; margin-bottom: 20px;"></p>
            <div class="issuer-brand">Studio Zen-Node</div>
            <div style="font-size: 0.9rem;">Email: miyazaki.ngn@gmail.com</div>
            <div style="margin-top:10px; font-size: 0.75rem; color: #007bff; border-bottom: 1px solid #007bff; display: inline-block;">
                studio-zen-node.github.io/service.html#orderform
            </div>
            <img src="zen-node-seal.png" class="issuer-stamp-img">
        </div>
    </div>

    <script>
        // --- 1. 管理者認証（簡易パスワード） ---
        const pass = prompt("管理者パスワードを入力してください");
        if (pass === "zen0403") { // パスワードは任意に変更してください
            document.body.style.display = "block";
        } else {
            alert("アクセス権限がありません");
            window.location.href = "about:blank";
        }

        const days = ["日", "月", "火", "水", "木", "金", "土"];
        document.getElementById('in-date').valueAsDate = new Date();

        function update() {
            const name = document.getElementById('in-name').value || "（宛名を入力）";
            const price = Number(document.getElementById('in-price').value).toLocaleString();
            const note = document.getElementById('in-note').value;
            const dateVal = new Date(document.getElementById('in-date').value);
            
            // 偽造防止用ランダムID生成
            const randomID = Math.random().toString(36).substring(2, 10).toUpperCase();
            
            const dateStr = `${dateVal.getFullYear()}年${dateVal.getMonth() + 1}月${dateVal.getDate()}日 (${days[dateVal.getDay()]})`;
            
            document.getElementById('out-name').innerText = name;
            document.getElementById('out-price').innerText = price;
            document.getElementById('out-note').innerText = note;
            document.getElementById('out-date').innerText = dateStr;
            document.getElementById('out-id').innerText = randomID;

            const y = dateVal.getFullYear();
            const m = String(dateVal.getMonth() + 1).padStart(2, '0');
            const d = String(dateVal.getDate()).padStart(2, '0');
            document.title = `${y}${m}${d}_${name}様_受領証`;
        }

        // --- 2. 自動PDFダウンロード機能 ---
        function downloadPDF() {
            update();
            const element = document.getElementById('receipt-pdf-area');
            const opt = {
                margin: 0,
                filename: document.title + '.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 3, useCORS: true }, // 高解像度
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        update();
    </script>
</body>
</html>
