<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Generator | Studio Zen-Node</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #111; color: #ccc; font-family: sans-serif; margin: 0; padding: 20px; }
        .config-panel { max-width: 700px; margin: 0 auto 30px; background: #1a1a1a; padding: 25px; border-radius: 12px; border: 1px solid #333; }
        .config-group { margin-bottom: 15px; }
        .config-label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        .config-input { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }
        .print-btn { width: 100%; padding: 18px; background: #007bff; color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .print-btn:hover { background: #0056b3; }
        
        /* 領収書本体 */
        #receipt-area {
            width: 700px; /* キャプチャ精度のため固定幅 */
            aspect-ratio: 1 / 1.414; 
            margin: 0 auto; background: #fff; color: #000; padding: 80px 60px; 
            box-sizing: border-box; position: relative;
        }
        .receipt-header { font-size: 2.8rem; font-weight: 900; text-align: center; border-bottom: 4px solid #000; padding-bottom: 15px; margin-bottom: 50px; letter-spacing: 1.2rem; }
        .receipt-to { font-size: 1.4rem; border-bottom: 2px solid #000; display: inline-block; min-width: 300px; margin-bottom: 50px; }
        .amount-box { text-align: center; font-size: 3.5rem; font-weight: bold; border-bottom: 3px double #000; margin: 50px 0; padding: 15px 0; font-family: serif; }
        .amount-box::before { content: "￥"; font-size: 2.5rem; }
        .amount-box::after { content: " -"; font-size: 2.5rem; }
        
        /* 発行者情報 */
        .issuer-info { text-align: right; position: absolute; bottom: 80px; right: 80px; }
        .issuer-brand { font-size: 2rem; font-weight: 900; letter-spacing: 0.1rem; }
        .issuer-link { font-size: 0.75rem; color: #007bff; text-decoration: none; border-bottom: 1px solid #007bff; }

        /* 画像スタンプ（自作印面）の配置 */
        .issuer-stamp-img {
            width: 85px; 
            height: auto; 
            position: absolute;
            bottom: -25px;
            right: -10px;
            transform: rotate(-8deg); 
            mix-blend-mode: multiply; 
            opacity: 0.95; 
        }

        @media print {
            body { background: none; padding: 0; }
            .config-panel { display: none; }
            #receipt-area { box-shadow: none; border: none; width: 100%; margin: 0; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="config-panel">
        <h2 style="margin-top:0; color:#007bff;">Receipt Generator</h2>
        <div class="config-group">
            <span class="config-label">宛名（クライアント名）</span>
            <input type="text" id="in-name" class="config-input" placeholder="例：長野 太郎" oninput="update()">
        </div>
        <div class="config-group">
            <span class="config-label">発行日</span>
            <input type="date" id="in-date" class="config-input" oninput="update()">
        </div>
        <div class="config-group">
            <span class="config-label">金額 / 但し書き</span>
            <input type="number" id="in-price" class="config-input" value="1000" oninput="update()">
            <input type="text" id="in-note" class="config-input" value="動画制作代金として" oninput="update()" style="margin-top:5px;">
        </div>
        <button class="print-btn" onclick="saveReceipt()">受領証を画像として保存 (即時DL)</button>
        <p style="text-align:center; font-size:0.7rem; color:#666; margin-top:10px;">※PDFが必要な場合は Ctrl+P から保存してください</p>
    </div>

    <div id="receipt-area">
        <div class="receipt-header">受 領 証</div>
        <div class="receipt-to"><span id="out-name"></span> 御中</div>
        <div class="amount-box" id="out-price">1,000</div>
        <div class="receipt-body">
            上記、正に受領いたしました。<br>
            但し、<span id="out-note"></span><br>
            <span style="font-size: 0.85rem; color: #555;">（内訳：Amazonギフト券によるお支払い）</span>
        </div>

        <div class="issuer-info" style="position: relative;">
            <p id="out-date" style="margin-bottom: 15px; font-weight: bold; font-size: 1.1rem;"></p>
            <div class="issuer-brand">Studio Zen-Node</div>
            <div style="font-size: 0.85rem; margin: 5px 0;">Email: miyazaki.ngn@gmail.com</div>
            <div style="margin-top: 10px;">
                <span style="font-size: 0.7rem; color: #888; display: block; margin-bottom: 2px;">ご依頼はこちらから</span>
                <a href="https://studio-zen-node.github.io/service.html#orderform" class="issuer-link">studio-zen-node.github.io/service.html#orderform</a>
            </div>
            
            <img src="zen-node-seal.png" alt="印" class="issuer-stamp-img">
        </div>
    </div>

    <script>
        const days = ["日", "月", "火", "水", "木", "金", "土"];
        const now = new Date();
        document.getElementById('in-date').valueAsDate = now;

        function update() {
            const name = document.getElementById('in-name').value || "（宛名）";
            const price = Number(document.getElementById('in-price').value).toLocaleString();
            const note = document.getElementById('in-note').value;
            const dateVal = new Date(document.getElementById('in-date').value);
            
            const dateStr = `${dateVal.getFullYear()}年${dateVal.getMonth() + 1}月${dateVal.getDate()}日 (${days[dateVal.getDay()]})`;
            
            document.getElementById('out-name').innerText = name;
            document.getElementById('out-price').innerText = price;
            document.getElementById('out-note').innerText = note;
            document.getElementById('out-date').innerText = dateStr;

            const y = dateVal.getFullYear();
            const m = String(dateVal.getMonth() + 1).padStart(2, '0');
            const d = String(dateVal.getDate()).padStart(2, '0');
            const fileName = `${y}${m}${d}_${name}様_受領証`;
            document.title = fileName; 
        }

        // 即時保存・ダウンロード機能
        function saveReceipt() {
            update();
            const target = document.getElementById("receipt-area");
            
            html2canvas(target, {
                scale: 2, // 高解像度でキャプチャ
                useCORS: true // 外部リソースがある場合用
            }).then(canvas => {
                const link = document.createElement("a");
                link.href = canvas.toDataURL("image/png");
                link.download = document.title + ".png"; // 自動生成したファイル名で保存
                link.click();
            });
        }

        update();
    </script>
</body>
</html>
