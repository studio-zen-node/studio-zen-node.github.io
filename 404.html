<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found | Studio Zen-Node</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 404専用のスタイル調整 */
        .error-container {
            padding: 100px 20px;
            text-align: center;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            color: #111;
            text-shadow: 0 0 20px rgba(0, 123, 255, 0.2);
            line-height: 1;
            margin-bottom: 20px;
        }
        .error-message {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 40px;
        }
        .back-btn {
            display: inline-block;
            background: #007bff;
            color: #fff;
            padding: 12px 30px;
            border-radius: 5px;
            text-decoration: none;
            transition: 0.3s;
            font-weight: bold;
        }
        .back-btn:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <script src="menu.js"></script>

    <div class="container">
        <div class="error-container">
            <div class="error-code">404</div>
            <h2 style="color: #007bff; margin-bottom: 10px;">Page Not Found</h2>
            <p class="error-message">お探しのページは削除されたか、URLが間違っている可能性があります。</p>
            
            <a href="index.html" class="back-btn">Return to Home</a>
        </div>
    </div>

    <div class="footer">&copy; 2026 Studio Zen-Node</div>

    <script>
        // セキュリティ：右クリックとドラッグ禁止（他ページと統一）
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('dragstart', e => e.preventDefault());
    </script>
</body>
</html>
